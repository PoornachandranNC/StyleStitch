<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login | Global Womens Fashion Style</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">Global Womens Fashion Style</div>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="catalog.html">Catalog</a>
      <a href="materials.html">Materials</a>
      <a href="my-orders.html">My Orders</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="admin-form-section" style="max-width: 520px; margin-top: 1.5rem;">
      <h1>Customer Login</h1>
      <p class="detail-meta">Login to reuse your saved details.</p>

      <form id="login-form">
        <div class="form-row">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-row">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required />
        </div>

        <div class="form-actions" style="margin-top: 0.5rem;">
          <button type="submit" class="btn primary">Login</button>
        </div>
        <p id="login-status" class="detail-meta" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Global Womens Fashion Style. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>
  <script src="js/env.local.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
